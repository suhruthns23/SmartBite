<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartBite</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <!-- Logo + Title -->
    <header class="header">
      <img src="logo.png" alt="SmartBite Logo" class="logo">
      <h1 class="app-name">SmartBite</h1>
      <p class="tagline">Cook smart with what you have</p>
    </header>

    <!-- Choice Section -->
    <section class="choice">
      <button onclick="chooseSearch('name')">Search by Recipe Name</button>
      <button onclick="chooseSearch('ingredients')">Search by Ingredients</button>
    </section>

    <!-- Dynamic Section -->
    <section id="dynamicSection"></section>

    <!-- Loading -->
    <div id="loading" class="loading" style="display:none;">
      <div class="spinner"></div>
      <p>Finding recipes...</p>
    </div>

    <!-- Results -->
    <section class="results" id="results"></section>

  </div>

  <script src="app.js"></script>
</body>
</html>
