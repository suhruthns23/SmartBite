<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartBite</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <!-- Home Section -->
    <section class="home">
      <img src="logo.png" alt="SmartBite Logo" class="logo">
      <h1 class="app-name">SmartBite</h1>
      <p class="tagline">Cook smart with what you have</p>

      <form class="input-section" onsubmit="findRecipes(); return false;">
        <input type="text" id="ingredientsInput" placeholder="Enter ingredients (e.g. tomato, rice)">
        <button type="submit">Find Recipes</button>
      </form>

      <div id="loading" class="loading" style="display:none;">
        <div class="spinner"></div>
        <p>Finding recipes...</p>
      </div>

      <section class="results" id="results">
        <div class="hint">Your recipes will appear here...</div>
      </section>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
